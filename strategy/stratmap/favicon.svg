<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Premium Gradients matching the logo image -->
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777" />
      <stop offset="40%" stop-color="#be123c" />
      <stop offset="100%" stop-color="#881337" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="60%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
  </defs>

  <!-- Diagonals -->
  <!-- Top-Left to Bottom-Right -->
  <line x1="25" y1="25" x2="50" y2="50" stroke="url(#red-grad)" stroke-width="8" stroke-linecap="round" />
  <line x1="50" y1="50" x2="75" y2="75" stroke="url(#blue-grad)" stroke-width="8" stroke-linecap="round" />

  <!-- Bottom-Left to Top-Right -->
  <line x1="25" y1="75" x2="50" y2="50" stroke="url(#red-grad)" stroke-width="8" stroke-linecap="round" />
  <line x1="50" y1="50" x2="75" y2="26" stroke="url(#blue-grad)" stroke-width="8" stroke-linecap="round" />

  <!-- Arrowheads -->
  <!-- Top-Left (Red) -->
  <polygon points="16,16 32,16 16,32" fill="url(#red-grad)" />

  <!-- Bottom-Left (Red) -->
  <polygon points="16,84 16,68 32,84" fill="url(#red-grad)" />

  <!-- Top-Right (Blue) -->
  <polygon points="84,16 68,16 84,32" fill="url(#blue-grad)" />

  <!-- Bottom-Right (Blue) -->
  <polygon points="84,84 84,68 68,84" fill="url(#blue-grad)" />

  <!-- Inward Pointers -->
  <!-- Top Vertical (Red) -->
  <polygon points="46,10 54,10 54,34 50,42 46,34" fill="url(#red-grad)" />

  <!-- Left Horizontal (Red) -->
  <polygon points="10,46 10,54 34,54 42,50 34,46" fill="url(#red-grad)" />

  <!-- Bottom Vertical (Blue) -->
  <polygon points="46,90 54,90 54,66 50,58 46,66" fill="url(#blue-grad)" />

  <!-- Right Horizontal (Blue) -->
  <polygon points="90,46 90,54 66,54 58,50 66,46" fill="url(#blue-grad)" />
</svg>
